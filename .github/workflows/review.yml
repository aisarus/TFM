name: Simple PR Review (stable)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Compute diff
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          git fetch origin $BASE $HEAD --depth=1 || true
          git diff --unified=0 $BASE $HEAD > diff.patch
          wc -l diff.patch || true

      - name: Write reviewer (CommonJS) and run
        run: |
          mkdir -p tools
          cat > tools/reviewer.js <<'JS'
const fs = require('fs');
const args = process.argv.slice(2);
const i = args.indexOf('--file');
let diff = i !== -1 ? fs.readFileSync(args[i+1],'utf8') : '';
if (!diff) { try { diff = fs.readFileSync(0,'utf8'); } catch {}
  if (!diff) { console.error('no diff'); process.exit(0); }
}
function parseDiff(t){
  const files=[]; let cur=null, n=null;
  for (const line of t.split('\n')){
    if (line.startsWith('diff --git') || line.startsWith('--- ') || line.startsWith('+++ ')){
      if (line.startsWith('+++ b/')) { cur = { path: line.slice(6), hunks: [] }; files.push(cur); }
      continue;
    }
    if (line.startsWith('@@')) { const m=/@@ -\d+(?:,\d+)? \+(\d+)/.exec(line); if (m){ n=+m[1]; cur && cur.hunks.push({start:n,lines:[]}); } continue; }
    if (line.startsWith('+')) { const c=line.slice(1); cur && cur.hunks[cur.hunks.length-1] && cur.hunks[cur.hunks.length-1].lines.push({n,content:c}); n++; continue; }
    if (line.startsWith('-')) continue;
    if (typeof n==='number') n++;
  } return files;
}
const files = parseDiff(diff);
const R = {
  debug: /\bconsole\.log\b|\bprint\s*\(|\bputs\b|dbg!\(/,
  todo: /TODO|FIXME/,
  dyn: /\beval\b|new Function\s*\(|child_process\.exec\s*\(|\bexec\s*\(/,
  star: /SELECT\s+\*/i,
  any: /\bany\b/,
  aws: /AKIA[0-9A-Z]{16}/,
  tok: /(token|apikey|api_key|secret)[\s:=]+['"][A-Za-z0-9_\-]{16,}['"]/i,
  priv: /-----BEGIN (?:RSA|OPENSSH|EC) PRIVATE KEY-----/
};
const S = { debug:0,todo:0,dynamic:0,starSelect:0,tsAny:0,secrets:0,missingTests:0,totalWarnings:0 };
const warn = (p,l,t,m)=>{ console.log(`::warning file=${p},line=${l},title=${t}::${m.replace(/[\r\n]+/g,' ').slice(0,400)}`); S.totalWarnings++; };

for (const f of files){
  const ts = f.path.endsWith('.ts');
  const added = f.hunks.flatMap(h=>h.lines||[]);
  for (const {n,content} of added){
    if (R.debug.test(content)) { S.debug++; warn(f.path,n,'Debug print','Remove debug prints.'); }
    if (R.todo.test(content)) { S.todo++; warn(f.path,n,'TODO/FIXME','Resolve or ticket.'); }
    if (R.dyn.test(content)) { S.dynamic++; warn(f.path,n,'Dynamic execution','Avoid eval/exec.'); }
    if (R.star.test(content)) { S.starSelect++; warn(f.path,n,'SELECT *','Select explicit columns.'); }
    if (ts && R.any.test(content)) { S.tsAny++; warn(f.path,n,'TypeScript any','Prefer explicit types.'); }
    if (R.aws.test(content) || R.tok.test(content) || R.priv.test(content)) { S.secrets++; warn(f.path,n,'Potential secret','Do not commit credentials.'); }
  }
}
const changedSrc = files.some(x=>x.path.startsWith('src/'));
const addedTests = files.some(x=>x.path.startsWith('test/'));
if (changedSrc && !addedTests) { S.missingTests++; warn('src/',1,'Missing tests','Changes in src/ without tests.'); }
fs.writeFileSync('stats.json', JSON.stringify(S));
JS
          node tools/reviewer.js --file diff.patch || true
          test -f stats.json || echo '{"debug":0,"todo":0,"dynamic":0,"starSelect":0,"tsAny":0,"secrets":0,"missingTests":0,"totalWarnings":0}' > stats.json

      - name: Write Summary (pie + flowchart + ASCII bar)
        run: |
          node - <<'JS'
          const fs=require('fs'); const s=JSON.parse(fs.readFileSync('stats.json','utf8'));
          const keys=["debug","todo","dynamic","starSelect","tsAny","secrets"]; const sum=keys.reduce((a,k)=>a+(+s[k]||0),0);
          const bar=k=>'█'.repeat(Math.min(30, Math.round(((+s[k]||0)/(sum||1))*30)));
          let md="## Heuristic Review Summary\n\n| Metric | Count |\n|---|---:|\n";
          for(const k of [...keys,"missingTests","totalWarnings"]) md+=`| ${k} | ${s[k]||0} |\n`;
          md+="\n### ASCII bar chart\n"; for(const k of keys) md+=`- ${k.padEnd(12)} ${bar(k)} ${s[k]||0}\n`;
          md+="\n### Issues by type\n```mermaid\npie title Issues by type\n"; for(const k of keys) md+=`  "${k}" : ${s[k]||0}\n`;
          md+="```\n\n### Pipeline overview\n```mermaid\nflowchart LR\n  A[PR opened/updated] --> B[Checkout & diff]\n  B --> C[Heuristic review]\n  C --> D{Findings}\n  D -->|warnings| E[Annotations]\n  D -->|stats.json| F[Summary Charts]\n```\n";
          fs.writeFileSync(process.env.GITHUB_STEP_SUMMARY, md);
          JS
